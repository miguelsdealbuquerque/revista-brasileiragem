<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Brasileiragem - Revista Digital</title>
    
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            min-width: 100vw;
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto; 
            font-family: sans-serif;
        }

        .magazine-wrapper {
            width: 90vw;
            height: 90vh; /* Altura controlada para centralizar bem */
            display: flex; /* Mudamos para flex para ajudar o autoCenter no mobile */
            align-items: center;
            justify-content: center;
            padding: 20px 0; 
        }

        .flipbook {
            display: none;
            margin: 0 auto; 
        }

        .page {
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: fill; 
            pointer-events: none;
        }

        /* OTIMIZAÇÃO PARA CELULARES */
        @media (max-width: 768px) {
            .magazine-wrapper {
                width: 95vw; /* Usa quase toda a largura da tela no celular */
                height: 85vh; /* Dá um respiro para a barra de endereços do navegador mobile */
            }
        }
    </style>
</head>
<body>

    <div class="magazine-wrapper">
        <div id="magazine" class="flipbook">
            
            <div class="page"><img src="img/01.png" alt="Página 01"></div>
            <div class="page"><img src="img/02.png" alt="Página 02"></div>
            <div class="page"><img src="img/03.png" alt="Página 03"></div>
            <div class="page"><img src="img/04.png" alt="Página 04"></div>
            <div class="page"><img src="img/05.png" alt="Página 05"></div>
            <div class="page"><img src="img/06.png" alt="Página 06"></div>
            <div class="page"><img src="img/07.png" alt="Página 07"></div>
            <div class="page"><img src="img/08.png" alt="Página 08"></div>
            <div class="page"><img src="img/09.png" alt="Página 09"></div>
            <div class="page"><img src="img/10.png" alt="Página 10"></div>
            <div class="page"><img src="img/11.png" alt="Página 11"></div>
            <div class="page"><img src="img/12.png" alt="Página 12"></div>

        </div>
    </div>

    <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            const magazine = document.getElementById('magazine');
            magazine.style.display = 'block';

            const pageFlip = new St.PageFlip(magazine, {
                width: 812,       
                height: 936,      
                size: "stretch",  
                
                // LIMITES REDUZIDOS PARA CABER NO CELULAR
                minWidth: 150,       
                minHeight: 173,      
                maxWidth: 750,       
                maxHeight: 864,      
                
                maxShadowOpacity: 0.5, 
                showCover: true,     
                
                // MODO MOBILE ATIVADO
                usePortrait: true,         // Faz a revista exibir 1 página só com a tela em pé
                mobileScrollSupport: true, // Libera o "arrastar" da tela no touch
                
                autoCenter: true,    
                flippingTime: 500    
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        });
    </script>
</body>
</html>
