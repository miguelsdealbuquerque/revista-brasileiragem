<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Brasileiragem - Revista Digital</title>
    
    <meta name="description" content="Revista Brasileiragem - Uma publicação independente sobre cultura, história e identidade brasileira. Arte visual e design editorial.">
    <meta name="keywords" content="Revista Brasileiragem, revista digital, cultura brasileira, arte visual, design editorial, Expocom, flipbook">
    <meta name="author" content="Bibia">
    <meta property="og:title" content="Brasileiragem - Revista Digital">
    <meta property="og:description" content="Leia a Revista Brasileiragem online. Uma exploração visual e cultural da nossa identidade.">
    <meta property="og:type" content="website">

    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            min-width: 100vw;
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto; 
            font-family: sans-serif;
            touch-action: pan-y pinch-zoom; /* Garante que o body aceite o zoom */
        }

        .magazine-wrapper {
            width: 90vw;
            height: 90svh; 
            display: flex; 
            align-items: center;
            justify-content: center;
            padding: 20px 0; 
            touch-action: pan-y pinch-zoom; /* Permite zoom em pinça e rolagem, bloqueia swipe nativo */
        }

        .flipbook {
            display: none;
            margin: 0 auto; 
        }

        .page {
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: fill; 
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .magazine-wrapper {
                width: 95vw; 
                height: 85svh; 
            }
        }
    </style>
</head>
<body>

    <div class="magazine-wrapper">
        <div id="magazine" class="flipbook">
            
            <div class="page"><img src="img/01.png" alt="Página 01"></div>
            <div class="page"><img src="img/02.png" alt="Página 02"></div>
            <div class="page"><img src="img/03.png" alt="Página 03"></div>
            <div class="page"><img src="img/04.png" alt="Página 04"></div>
            <div class="page"><img src="img/05.png" alt="Página 05"></div>
            <div class="page"><img src="img/06.png" alt="Página 06"></div>
            <div class="page"><img src="img/07.png" alt="Página 07"></div>
            <div class="page"><img src="img/08.png" alt="Página 08"></div>
            <div class="page"><img src="img/09.png" alt="Página 09"></div>
            <div class="page"><img src="img/10.png" alt="Página 10"></div>
            <div class="page"><img src="img/11.png" alt="Página 11"></div>
            <div class="page"><img src="img/12.png" alt="Página 12"></div>

        </div>
    </div>

    <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            const magazine = document.getElementById('magazine');
            magazine.style.display = 'block';

            const pageFlip = new St.PageFlip(magazine, {
                width: 812,       
                height: 936,      
                size: "stretch",  
                minWidth: 315,       
                minHeight: 363,      
                maxWidth: 1000,       
                maxHeight: 1150,      
                maxShadowOpacity: 0.3, 
                showCover: true,     
                usePortrait: true,   
                mobileScrollSupport: false, 
                
                // MÁGICA AQUI: autoCenter só ativado em monitores/telas grandes
                autoCenter: window.innerWidth > 768, 
                
                flippingTime: 450    
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        });
    </script>
</body>
</html>
