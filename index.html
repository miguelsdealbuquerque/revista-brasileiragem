<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Brasileiragem - Revista Digital</title>

    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            overflow: auto; /* IMPORTANTE: Garante que a barra de rolagem apareça se houver zoom */
            font-family: sans-serif;
        }

        /* Container de proteção */
        .magazine-wrapper {
            width: 100vw;
            /* IMPORTANTE: min-height em vez de height. Isso permite que a página 
               inteira cresça para baixo quando você dá zoom no PC. */
            min-height: 100vh; 
            
            display: flex;

            justify-content: center; /* Centraliza horizontalmente pelo CSS */
            
            padding: 40px 0; /* Dá um respiro pro PC em 100% de zoom */
            box-sizing: border-box;
        }

        /* O Flipbook centralizado pelo JS */
        .flipbook {
            display: none;
            /* O autoCenter do JS vai cuidar da horizontal em telas grandes */
        }

        .page {
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* Imagem preenchendo perfeitamente */
        .page img {
            width: 100%;
            height: 100%;
            object-fit: fill; 
            pointer-events: none;
        }

        /* AJUSTES ESPECÍFICOS PARA CELULAR */
        @media (max-width: 768px) {
            .magazine-wrapper {
                min-height: 100svh; /* svh ignora barra de endereços do celular */
                padding: 10px; /* Respiro mínimo para o celular */
                align-items: center; /* No celular, mantemos centralizado na vertical pq não tem zoom */
            }
        }
    </style>
</head>
<body>

    <div class="magazine-wrapper">
        <div id="magazine" class="flipbook">
            
            <div class="page"><img src="img/01.webp" alt="Página 01"></div>
            <div class="page"><img src="img/02.webp" alt="Página 02"></div>
            <div class="page"><img src="img/03.webp" alt="Página 03"></div>
            <div class="page"><img src="img/04.webp" alt="Página 04"></div>
            <div class="page"><img src="img/05.webp" alt="Página 05"></div>
            <div class="page"><img src="img/06.webp" alt="Página 06"></div>
            <div class="page"><img src="img/07.webp" alt="Página 07"></div>
            <div class="page"><img src="img/08.webp" alt="Página 08"></div>
            <div class="page"><img src="img/09.webp" alt="Página 09"></div>
            <div class="page"><img src="img/10.webp" alt="Página 10"></div>
            <div class="page"><img src="img/11.webp" alt="Página 11"></div>
            <div class="page"><img src="img/12.webp" alt="Página 12"></div>

        </div>
    </div>

    <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            const magazine = document.getElementById('magazine');
            magazine.style.display = 'block';

            // Detecta se é celular (largura < 768px)
            const isMobile = window.innerWidth < 768;

            const pageFlip = new St.PageFlip(magazine, {
                width: 812,       
                height: 936,      
                size: "stretch",  
                minWidth: 300,
                
                // Limites calculados matematicamente (Proporção Exata da Arte: 1.152)
                maxWidth: 750,       
                minHeight: 345,
                maxHeight: 864,      
                
                maxShadowOpacity: 0.5, 
                showCover: true,     
                mobileScrollSupport: false,
                
                // AutoCenter só é true no PC. No celular, desativa pra parar o pulo!
                autoCenter: !isMobile, 
                
                flippingTime: 500    
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        });
    </script>
</body>
</html>
